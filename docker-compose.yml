services:
  bridge:
    build: .
    restart: unless-stopped
    ports:
      - "8088:8088"
    env_file:
      - ../.codex/telegram/.env
    environment:
      - BRIDGE_HOST=0.0.0.0
      - BRIDGE_ADMIN_TOKEN=${BRIDGE_ADMIN_TOKEN}
      - CODEX_REMOTE_URL=ws://host.docker.internal:17374
      - CODEX_DEFAULT_CWD=/Users/azhu/Research.localized/AzhuTech
      - CODEX_MODEL=gpt-5.5
      - CODEX_APPROVALS_REVIEWER=auto_review
      - CODEX_BRIDGE_APPROVAL_FALLBACK=decline
    volumes:
      - ./config:/app/config
      - ./data:/app/data
